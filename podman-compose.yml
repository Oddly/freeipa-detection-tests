services:
  freeipa:
    image: freeipa/freeipa-server:rocky-9
    hostname: ipa.example.test
    container_name: freeipa
    environment:
      IPA_SERVER_HOSTNAME: ipa.example.test
      PASSWORD: ${IPA_ADMIN_PASSWORD:-Secret.123}
    command:
      - ipa-server-install
      - --unattended
      - --realm=EXAMPLE.TEST
      - --domain=example.test
      - --ds-password=${IPA_ADMIN_PASSWORD:-Secret.123}
      - --admin-password=${IPA_ADMIN_PASSWORD:-Secret.123}
      - --no-ntp
      - --no-host-dns
      - --skip-mem-check
    tmpfs:
      - /run
      - /tmp
    volumes:
      - freeipa-data:/data:Z
      - freeipa-logs:/var/log:Z
    networks:
      testnet:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "bash", "-c", "echo Secret.123 | kinit admin 2>/dev/null && ipa user-find --sizelimit=1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 40
      start_period: 300s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.0}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=trial
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es-data:/usr/share/elasticsearch/data:Z
    ports:
      - "9200:9200"
    networks:
      testnet:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.17.0}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=a]3{r7F2k9pZ5Q1mN8cL4jB6wA0dS-_=
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      testnet:
        ipv4_address: 172.28.0.21
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'available'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  filebeat:
    image: docker.elastic.co/beats/filebeat:${ELASTIC_VERSION:-8.17.0}
    container_name: filebeat
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro,Z
      - freeipa-logs:/var/log/freeipa:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      freeipa:
        condition: service_healthy
    networks:
      testnet:
        ipv4_address: 172.28.0.30

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    container_name: test-runner
    environment:
      IPA_SERVER: ipa.example.test
      IPA_ADMIN_PASSWORD: ${IPA_ADMIN_PASSWORD:-Secret.123}
      KIBANA_URL: http://kibana:5601
      ES_URL: http://elasticsearch:9200
    volumes:
      - ./tests:/tests:ro,Z
      - ./scripts:/scripts:ro,Z
      - ./rules:/rules:ro,Z
      - ./pipelines:/pipelines:ro,Z
    depends_on:
      freeipa:
        condition: service_healthy
      kibana:
        condition: service_healthy
    networks:
      testnet:
        ipv4_address: 172.28.0.40
    entrypoint: ["bash", "/scripts/run-tests.sh"]

volumes:
  freeipa-data:
  freeipa-logs:
  es-data:

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
