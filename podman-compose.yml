services:
  freeipa:
    image: freeipa/freeipa-server:rocky-9
    hostname: ipa.example.test
    container_name: freeipa
    environment:
      IPA_SERVER_HOSTNAME: ipa.example.test
      PASSWORD: ${IPA_ADMIN_PASSWORD:-Secret.123}
    command:
      - ipa-server-install
      - --unattended
      - --realm=EXAMPLE.TEST
      - --domain=example.test
      - --ds-password=${IPA_ADMIN_PASSWORD:-Secret.123}
      - --admin-password=${IPA_ADMIN_PASSWORD:-Secret.123}
      - --no-ntp
      - --no-host-dns
      - --skip-mem-check
    tmpfs:
      - /run
      - /tmp
    volumes:
      - freeipa-data:/data:Z
    healthcheck:
      test: ["CMD", "bash", "-c", "echo Secret.123 | kinit admin 2>/dev/null && ipa user-find --sizelimit=1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 40
      start_period: 300s

volumes:
  freeipa-data:
